<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JC Unblocked Games App Store</title>
    
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="apple-touch-icon" href="../favicon.png">
    <meta name="apple-mobile-web-app-title" content="JC Mini Games">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1c1c1e;
            --ios-blue: #007aff;
            --ios-text: #ffffff;
            --ios-secondary: #8e8e93;
            --ios-border: #38383a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            padding: 0 20px 100px 20px;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header Styling */
        header {
            padding: 40px 0 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        header h1 {
            font-size: 34px;
            font-weight: 700;
            margin: 0;
        }

        .profile-icon {
            width: 36px;
            height: 36px;
            background-color: var(--ios-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Hero / Featured Card (JC Unblocked) */
        .featured-card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.6)), url('JC Unblocked Logo.png');
            background-size: cover;
            background-position: center;
            height: 400px;
            border-radius: 16px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 30px;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .featured-card:active {
            transform: scale(0.97);
        }

        .featured-content {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
        }

        .featured-label {
            text-transform: uppercase;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            margin-bottom: 4px;
        }

        .featured-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        /* App List Grid */
        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin: 20px 0 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .see-all {
            color: var(--ios-blue);
            font-size: 16px;
            font-weight: 400;
            text-decoration: none;
        }

        .app-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--ios-border);
            text-decoration: none;
            color: inherit;
        }

        .app-row:last-child {
            border-bottom: none;
        }

        .app-icon-img {
            width: 60px;
            height: 60px;
            border-radius: 13px;
            background: var(--ios-card);
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 1px solid var(--ios-border);
        }

        .app-info {
            flex-grow: 1;
        }

        .app-name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .app-sub {
            font-size: 13px;
            color: var(--ios-secondary);
        }

        .get-btn {
            background-color: #323234;
            color: var(--ios-blue);
            font-weight: 700;
            padding: 6px 24px;
            border-radius: 20px;
            text-transform: uppercase;
            font-size: 14px;
        }

        /* Bottom Navigation */
        nav.tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 85px;
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--ios-border);
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
            z-index: 100;
        }

        .tab-item {
            text-align: center;
            color: var(--ios-secondary);
            text-decoration: none;
            font-size: 10px;
        }

        .tab-item.active {
            color: var(--ios-blue);
        }

        .tab-icon {
            font-size: 24px;
            margin-bottom: 4px;
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <span style="color: var(--ios-secondary); text-transform: uppercase; font-size: 13px; font-weight: 600;">Friday, March 13</span>
            <h1>Games</h1>
        </div>
        <div class="profile-icon">JC</div>
    </header>

    <a href="https://sites.google.com/view/jcunblockedio" class="featured-card">
        <div class="featured-content">
            <div class="featured-label">Must Play</div>
            <div class="featured-title">JC Unblocked</div>
            <p style="margin: 0; opacity: 0.8;">The ultimate hub for unblocked entertainment.</p>
        </div>
    </a>

    <div class="section-title">
        New Games
        <a href="#" class="see-all">See All</a>
    </div>

    <div class="app-list">
        <a href="#" class="app-row">
            <div class="app-icon-img">🚀</div>
            <div class="app-info">
                <div class="app-name">Orbit Racer</div>
                <div class="app-sub">High speed space racing</div>
            </div>
            <div class="get-btn">Get</div>
        </a>

        <a href="#" class="app-row">
            <div class="app-icon-img">⚔️</div>
            <div class="app-info">
                <div class="app-name">Pixel Quest</div>
                <div class="app-sub">Retro RPG Adventure</div>
            </div>
            <div class="get-btn">Get</div>
        </a>

        <a href="#" class="app-row">
            <div class="app-icon-img">🧩</div>
            <div class="app-info">
                <div class="app-name">Block Logic</div>
                <div class="app-sub">Brain-teasing puzzles</div>
            </div>
            <div class="get-btn">Get</div>
        </a>
    </div>

    <nav class="tab-bar">
        <a href="#" class="tab-item">
            <span class="tab-icon">📑</span>
            Today
        </a>
        <a href="#" class="tab-item active">
            <span class="tab-icon">🎮</span>
            Games
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">📱</span>
            Apps
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">🕹️</span>
            Arcade
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">🔍</span>
            Search
        </a>
    </nav>

</body>
</html>
